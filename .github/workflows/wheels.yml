name: build wheels

on:
  push:
    tags:
      - "plugin-v*"
  workflow_dispatch: {}

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: manylinux2014_x86_64
          - os: ubuntu-latest
            target: manylinux2014_aarch64
          - os: macos-13
            target: macosx_x86_64
          - os: macos-14
            target: macosx_arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: jkp-plugin
          target: ${{ matrix.target }}
          args: --release --strip --out ../dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/plugin-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
